<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPM Results Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial}
.container{max-width:1200px;margin:auto;padding:20px}
h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;margin-bottom:5px}
.subhead{color:#aaa;font-size:14px;margin-bottom:20px}

.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-bottom:25px}
.card{background:linear-gradient(145deg,#111,#0a0a0a);padding:15px;text-align:center;border-radius:6px;box-shadow:0 0 10px rgba(0,0,0,0.5);border-top:4px solid}
.gold{border-color:#e8c327}.silver{border-color:#aaa}.bronze{border-color:#b87333}
.card div:first-child{font-size:18px;color:#888}
.card div:nth-child(2){font-family:'Oswald';font-size:20px}
.card div:last-child{font-size:13px;color:#aaa}

.table{width:100%;border-collapse:collapse;background:#0f0f0f;border-radius:6px;overflow:hidden}
th,td{padding:12px;border-bottom:1px solid #1f1f1f;text-align:left}
th{color:#777;font-size:12px;text-transform:uppercase;background:#111}
tr:hover{background:#151515}
.pos{font-weight:bold}
.p1{color:#e8c327}.p2{color:#aaa}.p3{color:#b87333}
.mpm{color:#ff2a2a;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>MID PACK MAFIA - RACE RESULTS</h1>
<div class="subhead" id="subhead"></div>

<div class="podium" id="podium"></div>

<table class="table" id="resultsTable">
<thead>
<tr>
<th>Pos</th><th>Driver</th><th>Car</th><th>Best Lap</th><th>INC</th><th>Pts</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
// 🔥 MANUAL RACE CONFIG (RECOMMENDED)
document.getElementById('subhead').innerText = `${raceInfo.series} · ${raceInfo.track} · ${raceInfo.date}`;
};


fetch('results.csv')
.then(res=>res.text())
.then(text=>parseCSV(text));

function splitCSV(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') inQuotes = !inQuotes;
    else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
    else current += char;
  }
  result.push(current);
  return result;
}

function parseCSV(text){
 const lines=text.trim().split('\n');
 let headerIndex = lines.findIndex(line => line.includes('Fin Pos'));
 if(headerIndex === -1) return;

 const headers=splitCSV(lines[headerIndex]);
 const dataLines = lines.slice(headerIndex + 1);

 const getIndex=name=>headers.findIndex(h=>h.includes(name));
 const posI=getIndex('Fin Pos');
 const nameI=getIndex('Name');
 const carI=getIndex('Car');
 const bestI=getIndex('Fastest Lap Time');
 const incI=getIndex('Inc');
 const ptsI=getIndex('Points');

 const tbody=document.querySelector('#resultsTable tbody');
 const podiumDiv=document.getElementById('podium');
 tbody.innerHTML='';
 podiumDiv.innerHTML='';

 let results=[];

 dataLines.forEach(line=>{
   const cols=splitCSV(line);
   if(cols.length < 5) return;
   if(!cols[posI] || isNaN(parseInt(cols[posI]))) return;

   let obj={
     pos:parseInt(cols[posI]),
     driver:cols[nameI].replace(/"/g,'').trim(),
     car:mapCarID(cols[carI]),
     best:cols[bestI] || '',
     inc:cols[incI] || '',
     pts:ptsI !== -1 ? cols[ptsI] : ''
   };
   results.push(obj);
 });

 results.sort((a,b)=>a.pos-b.pos);

 const podiumClasses=['gold','silver','bronze'];
 results.slice(0,3).forEach((r,i)=>{
   podiumDiv.innerHTML += `<div class="card ${podiumClasses[i]}">
     <div>#${r.pos}</div>
     <div>${r.driver}</div>
     <div>${r.car}</div>
   </div>`;
 });

 results.forEach(r=>{
   let posClass = r.pos===1?'p1':r.pos===2?'p2':r.pos===3?'p3':'';
   let mpmDrivers=['Glenn Jacobs'];
   let driverClass = mpmDrivers.includes(r.driver)?'mpm':'';

   tbody.innerHTML += `
     <tr>
       <td class="pos ${posClass}">${r.pos}</td>
       <td class="${driverClass}">${r.driver}</td>
       <td>${r.car}</td>
       <td>${r.best}</td>
       <td>${r.inc}</td>
       <td>${r.pts}</td>
     </tr>`;
 });
}

function mapCarID(id){
 const carMap={
  '169':'Porsche 992 GT3 R',
  '132':'BMW M4 GT3 EVO',
  '185':'Ford Mustang GT3',
  '128':'Ferrari 296 GT3',
  '144':'Audi R8 LMS GT3 EVO II',
  '145':'Lamborghini Huracan GT3 EVO2',
  '146':'Mercedes AMG GT3',
  '147':'McLaren 720S GT3 EVO',
  '148':'Aston Martin Vantage GT3',
  '149':'Corvette Z06 GT3.R',
  '150':'Lexus RC F GT3'
 };
 return carMap[id] || id;
}
</script>
</body>
</html>
