<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPM Results (Google Sheets)</title>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:'Saira',sans-serif;font-weight:400}
.container{max-width:1200px;margin:auto;padding:20px}
h1{font-weight:700;font-size:48px;letter-spacing:3px;margin-bottom:5px;border-bottom:2px solid #ff2a2a;padding-bottom:5px}
.subhead{color:#aaa;font-size:14px;margin-bottom:15px}
.stats{display:flex;gap:15px;margin-bottom:20px}
.stat{flex:1;background:#111;padding:10px;border-left:3px solid #ff2a2a}
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-bottom:25px}
.card{background:#111;padding:15px;text-align:center;border-radius:6px;border-top:4px solid}
.gold{border-color:#e8c327}.silver{border-color:#aaa}.bronze{border-color:#b87333}
.table{width:100%;border-collapse:collapse;background:#0f0f0f;border-radius:6px;overflow:hidden}
th,td{padding:12px;border-bottom:1px solid #1f1f1f;text-align:left}
th{color:#777;font-size:12px;text-transform:uppercase;font-weight:700}
tr:hover{background:#151515}
.pos{font-weight:700}
.p1{color:#e8c327}.p2{color:#aaa}.p3{color:#b87333}
</style>
</head>
<body>
<div class="container">
<h1>MPM RACE RESULTS</h1>
<div class="subhead" id="subhead"></div>

<select id="raceSelect"></select>

<div class="stats" id="stats"></div>
<div class="podium" id="podium"></div>

<table class="table">
<thead>
<tr><th>Pos</th><th>Driver</th><th>Car</th><th>Best Lap</th><th>INC</th><th>Pts</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
// 🔥 REPLACE THIS WITH YOUR GOOGLE SHEET CSV LINK
const SHEET_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vQRQCL6lcyz4O7a7UJ0CJyDBIu0Czab1KD-koV1gINjGWPgKbIn-yyegmU5N-q9iMtMiPzky3rWM7Fo/pub?output=csv;

let allData = [];

fetch(SHEET_URL)
.then(r=>r.text())
.then(text=>{
  const lines = text.trim().split('
');

  // 🔥 robust CSV split (handles quotes)
  function splitCSV(line){
    let res=[],cur='',q=false;
    for(let c of line){
      if(c==='"') q=!q;
      else if(c===','&&!q){res.push(cur);cur='';}
      else cur+=c;
    }
    res.push(cur);
    return res;
  }

  const headers = splitCSV(lines[0]);

  const getIndex = (name)=>headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));

  const simI = getIndex('Sim');
  const raceI = getIndex('Race');
  const posI = getIndex('Fin Pos');
  const nameI = getIndex('Name');
  const carI = getIndex('Car');
  const bestI = getIndex('Fastest Lap Time');
  const incI = getIndex('Inc');
  const ptsI = getIndex('Points');

  for(let i=1;i<lines.length;i++){
    const row = splitCSV(lines[i]);

    if(!row[posI] || isNaN(parseInt(row[posI]))) continue;

    allData.push({
      sim: row[simI],
      race: row[raceI],
      pos: parseInt(row[posI]),
      driver: row[nameI],
      car: simplifyCar(row[carI]),
      best: row[bestI],
      inc: parseInt(row[incI]),
      pts: row[ptsI]
    });
  }

  initRaces();
});
});

function initRaces(){
  const races = [...new Set(allData.map(r=>r.race))];
  const select = document.getElementById('raceSelect');

  races.forEach(r=>{
    let opt=document.createElement('option');
    opt.value=r;
    opt.textContent=r;
    select.appendChild(opt);
  });

  select.onchange = loadRace;
  loadRace();
}

function loadRace(){
  const race = document.getElementById('raceSelect').value;

  const filtered = allData.filter(r=>r.race===race);
  filtered.sort((a,b)=>a.pos-b.pos);

  document.getElementById('subhead').innerText = race;

  // stats (handle empty safely)
  if(filtered.length === 0) return;

  let fastest = filtered.reduce((a,b)=>a.best<b.best?a:b);
  let cleanest = filtered.reduce((a,b)=>a.inc<b.inc?a:b);

  document.getElementById('stats').innerHTML=`
    <div class="stat">⚡ Fastest Lap<br>${fastest.driver} (${fastest.best})</div>
    <div class="stat">🧼 Cleanest<br>${cleanest.driver} (${cleanest.inc}x)</div>
  `;

  // podium
  let podium=document.getElementById('podium');
  podium.innerHTML='';
  ['gold','silver','bronze'].forEach((c,i)=>{
    let r=filtered[i];
    if(!r) return;
    podium.innerHTML+=`<div class="card ${c}">
      <div>#${r.pos}</div>
      <div>${r.driver}</div>
      <div>${r.car}</div>
    </div>`;
  });

  // table
  let tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  filtered.forEach(r=>{
    tbody.innerHTML+=`<tr>
      <td class="pos ${r.pos<=3?'p'+r.pos:''}">${r.pos}</td>
      <td>${r.driver}</td>
      <td>${r.car}</td>
      <td>${r.best}</td>
      <td>${r.inc}</td>
      <td>${r.pts}</td>
    </tr>`;
  });
}

// 🔥 clean car names automatically
function simplifyCar(car){
  if(!car) return '';
  let c = car.toLowerCase();
  if(c.includes('porsche')) return 'Porsche 992 GT3 R';
  if(c.includes('ferrari')) return 'Ferrari 296 GT3';
  if(c.includes('corvette')) return 'Corvette Z06 GT3.R';
  if(c.includes('ford')) return 'Ford Mustang GT3';
  if(c.includes('bmw')) return 'BMW M4 GT3 EVO';
  return car;
} (${fastest.best})</div>
    <div class="stat">🧼 Cleanest<br>${cleanest.driver} (${cleanest.inc}x)</div>
  `;

  // podium
  let podium=document.getElementById('podium');
  podium.innerHTML='';
  ['gold','silver','bronze'].forEach((c,i)=>{
    let r=filtered[i];
    if(!r) return;
    podium.innerHTML+=`<div class="card ${c}">
      <div>#${r.pos}</div>
      <div>${r.driver}</div>
      <div>${r.car}</div>
    </div>`;
  });

  // table
  let tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  filtered.forEach(r=>{
    tbody.innerHTML+=`<tr>
      <td class="pos ${r.pos<=3?'p'+r.pos:''}">${r.pos}</td>
      <td>${r.driver}</td>
      <td>${r.car}</td>
      <td>${r.best}</td>
      <td>${r.inc}</td>
      <td>${r.pts}</td>
    </tr>`;
  });
}
</script>
</body>
</html>
