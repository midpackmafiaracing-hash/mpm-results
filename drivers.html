<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mid Pack Mafia - Drivers</title>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Saira', sans-serif; background: #000; color: #fff; }

    nav {
      background: #000;
      border-bottom: 3px solid #ff0000;
      padding: 0 2.5rem;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-wordmark {
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 36px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }
    .nav-wordmark span { color: #ff0000; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .nav-links a:hover, .nav-links a.active { color: #ff0000; }

    .page-header {
      background: #000;
      border-bottom: 1px solid #1a1a1a;
      padding: 3rem 2.5rem 2.5rem;
    }
    .page-header-inner { max-width: 1200px; margin: 0 auto; }
    .section-label {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 19px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff0000;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: #1a1a1a; }
    .page-title {
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 48px;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }
    .page-title span { color: #ff0000; }

    .drivers-grid {
      max-width: 1200px;
      margin: 3rem auto;
      padding: 0 2.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    .driver-card {
      cursor: pointer;
      transition: transform 0.2s;
      border-radius: 8px;
      overflow: hidden;
    }
    .driver-card:hover { transform: translateY(-8px); }
    .driver-card img { width: 100%; height: auto; display: block; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-top: 3px solid #ff0000;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: #555;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      z-index: 10;
    }
    .modal-close:hover { color: #ff0000; }

    .modal-header {
      display: grid;
      grid-template-columns: 180px 1fr;
      min-height: 220px;
      border-bottom: 1px solid #1a1a1a;
    }
    .modal-card-thumb { background: #000; overflow: hidden; }
    .modal-card-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .modal-title {
      padding: 1.5rem 3rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .modal-number {
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: #ff0000;
      letter-spacing: 0.12em;
    }
    .modal-name {
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 26px;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.1;
    }
    .modal-location {
      font-family: 'Saira', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #555;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .modal-body { padding: 1.5rem; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1a1a1a;
    }
    .info-cell { background: #0a0a0a; padding: 0.875rem 1rem; }
    .info-cell.full { grid-column: 1 / -1; }
    .info-label {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ff0000;
      margin-bottom: 4px;
    }
    .info-value {
      font-family: 'Saira', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: #fff;
      line-height: 1.6;
    }

    .loading-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem;
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
    }

    footer {
      background: #000;
      border-top: 3px solid #ff0000;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 4rem;
    }
    .footer-copy {
      font-family: 'Saira', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #444;
      letter-spacing: 0.08em;
    }
    .footer-tagline {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ff0000;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-wordmark" href="index.html">MID PACK <span>MAFIA</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="drivers.html" class="active">Drivers</a></li>
    <li><a href="series.html">Series</a></li>
    <li><a href="results.html">Results</a></li>
    <li><a href="media.html">Media</a></li>
    <li><a href="calendar.html">Calendar</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="section-label">Roster</div>
    <h1 class="page-title">Meet the <span>Drivers</span></h1>
  </div>
</div>

<div class="drivers-grid" id="drivers-grid">
  <div class="loading-msg">Loading drivers...</div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">&#x2715;</button>
    <div class="modal-header">
      <div class="modal-card-thumb" id="modal-thumb"></div>
      <div class="modal-title">
        <div class="modal-number" id="modal-number"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-location" id="modal-location"></div>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>
  <div class="footer-copy">&copy; 2025 Mid Pack Mafia. All rights reserved.</div>
  <div class="footer-tagline">Respect the Process. Fear the Results.</div>
</footer>

<script>
  const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkvfqLGrTpUK5-3R4tfPL-rgpTXtwrBN1K-omxTG_z3A5Z_tkyeJi2MV8jpkCxAKaAZsKom8B5I68Y/pub?output=csv';
  const IMG_BASE = 'https://raw.githubusercontent.com/midpackmafiaracing-hash/mpm-results/main/images/drivers/';

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
      const vals = [];
      let inQuote = false, cur = '';
      for (const ch of line) {
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { vals.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      vals.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, ''));
      return obj;
    });
  }

  function field(label, value, full = false) {
    if (!value || value.trim() === '' || value.trim() === '0') return '';
    return `<div class="info-cell${full ? ' full' : ''}">
      <div class="info-label">${label}</div>
      <div class="info-value">${value}</div>
    </div>`;
  }

  function buildCard(driver) {
    const hasCard = driver.image && driver.image.trim() !== '';
    if (!hasCard) return null;
    const card = document.createElement('div');
    card.className = 'driver-card';
    card.innerHTML = `<img src="${IMG_BASE}${driver.image}" alt="${driver.name}" onerror="this.parentElement.style.display='none'">`;
    card.addEventListener('click', () => openModal(driver));
    return card;
  }

  function openModal(driver) {
    const hasCard = driver.image && driver.image.trim() !== '';
    document.getElementById('modal-number').textContent = '#' + driver.number;
    document.getElementById('modal-name').textContent = driver.name;
    document.getElementById('modal-location').textContent = driver.location || '';

    const thumb = document.getElementById('modal-thumb');
    thumb.innerHTML = hasCard
      ? `<img src="${IMG_BASE}${driver.image}" alt="${driver.name}">`
      : '';

    const body =
      field('Age', driver.age) +
      field('Time in MPM', driver.time_in_mpm) +
      field('Experience', driver.experience) +
      field('Currently Racing', driver.car) +
      field('Preferred Sims', driver.sims, true) +
      field('Driving Style', driver.style, true) +
      field('Racing Highlights', driver.highlights, true) +
      field('SimGrid Wins', driver['SimGrid Wins']) +
      field('iRacing Wins', driver['iRacing Wins']) +
      field('LMU Wins', driver['LMU Wins']);

    document.getElementById('modal-body').innerHTML = `<div class="info-grid">${body}</div>`;
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  async function loadDrivers() {
    const grid = document.getElementById('drivers-grid');
    try {
      const res = await fetch(SHEET_CSV);
      if (!res.ok) throw new Error('Failed');
      const text = await res.text();
      const drivers = parseCSV(text);
      grid.innerHTML = '';
      drivers.forEach(d => {
        if (d.name) {
          const card = buildCard(d);
          if (card) grid.appendChild(card);
        }
      });
      if (grid.children.length === 0) {
        grid.innerHTML = '<div class="loading-msg" style="color:#555;">No driver cards uploaded yet.</div>';
      }
    } catch(e) {
      grid.innerHTML = '<div class="loading-msg" style="color:#555;">Unable to load drivers. Please try again later.</div>';
    }
  }

  loadDrivers();
</script>

</body>
</html>
